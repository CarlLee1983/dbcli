# Integration test databases
# Usage: docker compose -f docker-compose.test.yml up -d
# Ports offset to avoid conflicts with local databases (3307/5433)

services:
  mysql:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: dbcli_test
      MYSQL_USER: dbcli
      MYSQL_PASSWORD: testpass
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptestpass"]
      interval: 3s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/mysql

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: dbcli_test
      POSTGRES_USER: dbcli
      POSTGRES_PASSWORD: testpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbcli -d dbcli_test"]
      interval: 3s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
